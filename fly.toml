app = "valentina-agenda"
primary_region = "qro"

[build]
  builder = "heroku/buildpacks:20"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "valentina_data"
  destination = "/data"

[env]
  DB_PATH = "/data/data.db"
  NODE_ENV = "production"
